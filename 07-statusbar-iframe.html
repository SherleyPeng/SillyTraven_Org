<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StatusBar</title>
<style>
:root {
  --bg: #0f0f1a;
  --glass: rgba(255,255,255,0.06);
  --glass-hover: rgba(255,255,255,0.10);
  --border: rgba(255,255,255,0.10);
  --text: #e0e0e0;
  --dim: #888;
  --bright: #fff;
  --accent: #7c8cf8;
  --accent-dim: rgba(124,140,248,0.25);
  --danger: #f87171;
  --warn: #fbbf24;
  --success: #34d399;
  --pink: #f472b6;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  font-size: 13px;
  line-height: 1.5;
}
.panel { padding: 8px; max-width: 600px; margin: 0 auto; }

/* Tabs */
.tabs { display:flex; gap:4px; padding:5px; background:var(--glass); backdrop-filter:blur(16px); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; }
.tab { flex:1; padding:7px 3px; border:none; background:transparent; color:var(--dim); font-size:12px; cursor:pointer; border-radius:8px; transition:.2s; }
.tab:hover { background:var(--glass-hover); }
.tab.act { background:var(--accent-dim); color:var(--accent); font-weight:600; }

/* Panels */
.pnl { display:none; }
.pnl.act { display:block; }

/* Cards */
.card { background:var(--glass); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin-bottom:6px; }
.card-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.card-t { font-size:13px; font-weight:600; color:var(--bright); }
.card-s { font-size:11px; color:var(--dim); }

/* Grid */
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:5px 10px; }
.field { display:flex; flex-direction:column; }
.flabel { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; }
.fvalue { font-size:12px; color:var(--text); }

/* Chips */
.chips { display:flex; flex-wrap:wrap; gap:3px; }
.chip { background:var(--glass-hover); border:1px solid var(--border); border-radius:5px; padding:2px 7px; font-size:10px; }

/* Asset */
.asset { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.asset-v { font-size:15px; font-weight:600; color:var(--bright); }

/* Transaction */
.txlist { max-height: 180px; overflow-y: auto; }
.tx { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:10px; }
.tx-d { color:var(--dim); width:68px; flex-shrink:0; }
.tx-c { color:var(--dim); width:52px; flex-shrink:0; text-align:center; }
.tx-a { font-weight:600; width:60px; flex-shrink:0; text-align:right; }
.tx-in { color:var(--success); }
.tx-out { color:var(--danger); }

/* Time */
.tim { text-align:center; padding:16px 10px; }
.tim-c { font-size:32px; font-weight:200; color:var(--bright); letter-spacing:2px; }
.tim-d { font-size:15px; color:var(--text); margin-top:3px; }
.tim-w { font-size:12px; color:var(--accent); margin-top:2px; }
.tim-we { font-size:18px; margin-top:5px; }

/* NPC */
.npc { background:var(--glass); backdrop-filter:blur(12px); border:1px solid var(--border); border-radius:var(--radius); padding:9px 11px; margin-bottom:5px; cursor:pointer; transition:.15s; }
.npc:hover { background:var(--glass-hover); border-color:var(--accent-dim); }
.npc-hd { display:flex; justify-content:space-between; }
.npc-n { font-size:12px; font-weight:600; color:var(--bright); }
.npc-a { font-size:10px; color:var(--dim); }
.npc-st { display:flex; gap:10px; margin-top:4px; font-size:10px; color:var(--dim); }

/* Bars */
.bar-w { width:50px; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:3px; }
.bar-f { height:100%; border-radius:2px; display:block; }
.aff { background:var(--pink); }
.obed { background:var(--accent); }

/* Badge */
.badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; }
.b-safe { background:rgba(52,211,153,0.2); color:var(--success); }
.b-fertile { background:rgba(251,191,36,0.2); color:var(--warn); }
.b-period { background:rgba(248,113,113,0.2); color:var(--danger); }

/* Tag */
.tag { display:inline-block; background:var(--glass-hover); border-radius:3px; padding:1px 5px; font-size:10px; margin:1px; }
.tv { color:var(--success); }
.tnv { color:var(--warn); }
.tp { color:var(--danger); }

/* Empty */
.empty { text-align:center; padding:24px; color:var(--dim); font-size:12px; }

/* Row */
.row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:11px; }
.row-l { color:var(--bright); font-weight:600; }
.row-r { color:var(--dim); }

/* Modal */
.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(15,15,26,0.97); z-index:999; flex-direction:column; overflow:hidden; }
.modal.act { display:flex; }
.modal-hd { display:flex; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
.modal-t { font-size:15px; font-weight:600; color:var(--bright); }
.modal-x { width:28px; height:28px; border:none; background:var(--glass); color:var(--text); font-size:16px; border-radius:6px; cursor:pointer; }
.modal-body { flex:1; overflow-y:auto; padding:12px 14px; }

.ms { margin-bottom:12px; }
.ms-t { font-size:11px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.mg { display:grid; grid-template-columns:repeat(auto-fill, minmax(85px, 1fr)); gap:5px; }
.mf { background:var(--glass); border:1px solid var(--border); border-radius:5px; padding:5px 7px; }
.mfl { font-size:10px; color:var(--dim); }
.mfv { font-size:12px; color:var(--text); margin-top:1px; }

.bp { background:var(--glass); border:1px solid var(--border); border-radius:var(--radius); padding:9px 11px; margin-bottom:5px; }
.bpn { font-size:11px; font-weight:600; color:var(--pink); margin-bottom:5px; }
.bpg { display:grid; grid-template-columns:repeat(auto-fill, minmax(70px, 1fr)); gap:3px 7px; }
</style>
</head>
<body>
<div class="panel">
  <div class="tabs">
    <button class="tab act" data-i="0">&#x1F464; 人物</button>
    <button class="tab" data-i="1">&#x1F4B0; 财务</button>
    <button class="tab" data-i="2">&#x1F550; 时间</button>
    <button class="tab" data-i="3">&#x1F495; 关系</button>
  </div>
  <div class="pnl act" id="p-0"></div>
  <div class="pnl" id="p-1"></div>
  <div class="pnl" id="p-2"></div>
  <div class="pnl" id="p-3"></div>

  <div class="modal" id="modal">
    <div class="modal-hd">
      <span class="modal-t" id="modal-t"></span>
      <button class="modal-x" id="modal-x">&times;</button>
    </div>
    <div class="modal-body" id="modal-b"></div>
  </div>
</div>

<script>
(function(){
  var cur = {};
  var sig = '';
  var lastGood = null;

  function g(obj,path,def){if(!obj||!path)return def;var k=path.replace(/\[(\d+)\]/g,'.$1').split('.'),c=obj;for(var i=0;i<k.length;i++){if(c==null)return def;c=c[k[i]];}return c!=null?c:def;}
  function s(v,d){return(v==null||v==='')?(d||'-'):String(v);}
  function n(v,d){var x=Number(v);return isNaN(x)?(d!=null?String(d):'0'):String(x);}

  function readData() {
    // MVU stores stat_data in message 0 (from InitVar), patches accumulate there
    if (typeof Mvu !== 'undefined' && Mvu.getMvuData) {
      for (var mi = 0; mi <= 2; mi++) {
        try {
          var r = Mvu.getMvuData({ type: 'message', message_id: mi });
          if (r && r.stat_data && Object.keys(r.stat_data).length) return r.stat_data;
        } catch(e) {}
      }
    }
    if (typeof getVariables === 'function') {
      for (var mi = 0; mi <= 2; mi++) {
        try {
          var r = getVariables({ type: 'message', message_id: mi });
          if (r && r.stat_data && Object.keys(r.stat_data).length) return r.stat_data;
        } catch(e) {}
      }
      try {
        var r = getVariables({ type: 'chat' });
        if (r && r.stat_data && Object.keys(r.stat_data).length) return r.stat_data;
      } catch(e) {}
    }
    return lastGood || {};
  }

  function renderProfile(d) {
    var p=d.profile||{},bg=p.background||{},st=p.status||{},app=p.appearance||{},inv=p.inventory||[],rels=p.relationships||{},rk=Object.keys(rels);
    var h='';function f(l,v){return'<div class="field"><span class="flabel">'+l+'</span><span class="fvalue">'+v+'</span></div>';}
    h+='<div class="card"><div class="card-hd"><span class="card-t">'+s(p.name)+'</span><span class="card-s">'+s(p.occupation)+'</span></div><div class="grid">';
    h+=f('性别',s(p.gender));h+=f('年龄',n(p.age)+'岁');h+=f('出生',n(p.birth_year)+'.'+n(p.birth_month)+'.'+n(p.birth_day));
    h+=f('外貌',s(app.build)+(app.full?', '+s(app.full):''));h+=f('身体',s(st.physical));h+=f('精神',s(st.mental));
    h+='</div></div><div class="card"><div class="card-t" style="margin-bottom:5px">背景</div><div class="grid">';
    h+=f('家乡',s(bg.hometown));h+=f('教育',s(bg.education));h+=f('居住',s(bg.living));h+=f('求职',s(bg.job_status));
    h+='</div></div><div class="card"><div class="card-t" style="margin-bottom:5px">物品</div>';
    if(inv.length){h+='<div class="chips">';for(var i=0;i<inv.length;i++)h+='<span class="chip">'+s(inv[i].name)+(inv[i].desc?'('+s(inv[i].desc)+')':'')+'</span>';h+='</div>';}else h+='<span class="flabel">暂无</span>';
    h+='</div>';
    if(rk.length){h+='<div class="card"><div class="card-t" style="margin-bottom:5px">关系 ('+rk.length+')</div>';
      for(var ri=0;ri<rk.length;ri++){var r=rels[rk[ri]];h+='<div class="row"><span class="row-l">'+s(r.name)+'</span><span class="row-r">'+s(r.relation)+' - '+s(r.status)+'</span></div>';}h+='</div>';}
    return h;
  }

  function renderFinance(d) {
    var f=d.finance||{},a=f.assets||{},tx=f.transactions||[],ak=Object.keys(a);
    var h='<div class="card"><div class="card-t" style="margin-bottom:6px">资产</div>';
    if(ak.length)for(var i=0;i<ak.length;i++)h+='<div class="asset"><span>'+s(ak[i])+'</span><span class="asset-v">'+n(a[ak[i]],'0')+' 元</span></div>';
    else h+='<span class="flabel">暂无</span>';
    h+='</div>';
    if(tx.length){h+='<div class="card"><div class="card-t" style="margin-bottom:6px">收支</div><div class="txlist">';
      var st=Math.max(0,tx.length-10);for(var ti=st;ti<tx.length;ti++){var t=tx[ti],inc=t.type==='收入';
        h+='<div class="tx"><span class="tx-d">'+s(t.date)+'</span><span class="tx-c">'+s(t.category)+'</span><span class="tx-a '+(inc?'tx-in':'tx-out')+'">'+(inc?'+':'')+n(t.amount,'0')+'</span></div>';}
      h+='</div></div>';}
    return h;
  }

  function renderTime(d){var t=d.time||{};return'<div class="card tim"><div class="tim-c">'+String(t.hour||0).padStart(2,'0')+':'+String(t.minute||0).padStart(2,'0')+'</div><div class="tim-d">'+n(t.year)+'年'+n(t.month)+'月'+n(t.day)+'日</div><div class="tim-w">'+s(t.weekday)+'</div><div class="tim-we">'+s(t.weather)+'</div></div>';}

  function renderRelations(d) {
    var sx=d.sexual||{},ml=d.npc_male||{},sk=Object.keys(sx),mk=Object.keys(ml),h='';
    function bar(v,m,c){var p=Math.min(100,Math.max(0,(Number(v)||0)/(Number(m)||1)*100));return'<span class="bar-w"><span class="bar-f '+c+'" style="width:'+p+'%"></span></span>'+Math.round(p);}
    if(sk.length)for(var i=0;i<sk.length;i++){
      var u=sk[i],sn=sx[u],ph=g(sn,'menstrual.current_phase','?'),bc=({'安全期':'b-safe','受孕期':'b-fertile','月经中':'b-period'})[ph]||'';
      h+='<div class="npc" data-uid="'+u+'"><div class="npc-hd"><span class="npc-n">'+s(sn.name)+'</span><span class="npc-a">'+n(sn.age)+'岁</span></div>';
      h+='<div class="npc-st"><span>好感 '+bar(sn.affection,100,'aff')+'</span><span>服从 '+bar(sn.obedience,100,'obed')+'</span><span class="badge '+bc+'">'+s(ph)+'</span></div>';
      h+='<span style="font-size:10px;color:var(--dim)">'+(sn.is_virgin?'<span class="tag tv">处</span>':'<span class="tag tnv">非处</span>')+(g(sn,'uterus.pregnancy')?'<span class="tag tp">孕</span>':'')+'</span></div>';
    }
    if(mk.length)for(var mi=0;mi<mk.length;mi++){var mn=ml[mk[mi]];h+='<div class="card"><div class="card-hd"><span class="card-t">'+s(mn.name)+'</span><span class="card-s">'+n(mn.age)+'岁</span></div><div class="grid"><div class="field"><span class="flabel">职业</span><span class="fvalue">'+s(mn.occupation)+'</span></div><div class="field"><span class="flabel">关系</span><span class="fvalue">'+s(mn.social_status)+'</span></div></div></div>';}
    return h||'<div class="empty">暂无 NPC</div>';
  }

  function renderModalBody(sn) {
    var bp=sn.body_parts||{},br=bp.breasts||{},nip=bp.nipples||{},vag=bp.vagina||{},ut=bp.uterus||{},an=bp.anus||{},mnst=sn.menstrual||{},exp=sn.experience||{};
    function mf(l,v){return'<div class="mf"><div class="mfl">'+l+'</div><div class="mfv">'+v+'</div></div>';}
    function bpsec(name,fields){var h='<div class="bp"><div class="bpn">'+name+'</div><div class="bpg">';for(var i=0;i<fields.length;i++)h+=mf(fields[i][0],fields[i][1]);return h+'</div></div>';}
    function bar(v,m,c){var p=Math.min(100,Math.max(0,(Number(v)||0)/(Number(m)||1)*100));return'<span class="bar-w"><span class="bar-f '+c+'" style="width:'+p+'%"></span></span>'+Math.round(p);}

    var h='<div class="ms"><div class="ms-t">基本信息</div><div class="mg">';
    h+=mf('姓名',s(sn.name));h+=mf('年龄',n(sn.age)+'岁');h+=mf('出生',n(sn.birth_year)+'.'+n(sn.birth_month)+'.'+n(sn.birth_day));
    h+=mf('处女',sn.is_virgin?'是':'否');if(!sn.is_virgin&&sn.first_partner)h+=mf('初夜对象',s(sn.first_partner));
    h+=mf('好感',bar(sn.affection,100,'aff'));h+=mf('服从',bar(sn.obedience,100,'obed'));
    h+='</div></div>';

    h+='<div class="ms"><div class="ms-t">外貌与穿着</div>'+mf('外貌',s(sn.appearance))+mf('穿着',s(sn.outfit))+'</div>';
    if(sn.personality)h+='<div class="ms"><div class="ms-t">性格</div><div style="font-size:11px;color:var(--dim);line-height:1.6">'+s(sn.personality).replace(/\n/g,'<br>')+'</div></div>';

    h+='<div class="ms"><div class="ms-t">月经周期</div><div class="mg">';
    h+=mf('周期',n(mnst.cycle_length,'28')+'天');h+=mf('经期',n(mnst.period_duration,'5')+'天');
    h+=mf('上次',s(mnst.last_period_date));h+=mf('状态',s(mnst.current_phase));
    h+='</div></div>';

    h+='<div class="ms"><div class="ms-t">性经验</div><div class="mg">';
    h+=mf('总计',n(exp.total)+'次');h+=mf('口交',n(exp.oral)+'次');h+=mf('插入',n(exp.vaginal)+'次');h+=mf('肛交',n(exp.anal)+'次');h+=mf('高潮',n(sn.orgasm_count)+'次');
    h+='</div></div>';

    h+='<div class="ms"><div class="ms-t">身体部位</div>';
    h+=bpsec('胸部',[['大小',s(br.size)],['形状',s(br.shape)],['颜色',s(br.color)],['敏感度',s(br.sensitivity)],['状态',s(br.status)]]);
    h+=bpsec('乳头',[['形状',s(nip.shape)],['颜色',s(nip.color)],['乳晕色',s(nip.areola_color)],['乳晕大',s(nip.areola_size)],['敏感度',s(nip.sensitivity)],['状态',s(nip.status)]]);
    h+=bpsec('小穴',[['形状',s(vag.shape)],['外阴色',s(vag.color)],['内壁色',s(vag.inner_color)],['松紧',s(vag.tightness)],['湿润',s(vag.wetness)],['敏感度',s(vag.sensitivity)],['状态',s(vag.status)]]);
    h+=bpsec('子宫',[['正常',ut.is_normal?'是':'异常'],['怀孕',ut.pregnancy?s(ut.pregnancy):'无'],['敏感度',s(ut.sensitivity)],['状态',s(ut.status)]]);
    h+=bpsec('肛门',[['形状',s(an.shape)],['颜色',s(an.color)],['松紧',s(an.tightness)],['敏感度',s(an.sensitivity)],['开发',an.is_developed?'是':'未'],['状态',s(an.status)]]);
    h+='</div>';

    var fet=sn.fetishes||[];if(fet.length){h+='<div class="ms"><div class="ms-t">性癖</div><div>';for(var fi=0;fi<fet.length;fi++)h+='<span class="tag">'+s(fet[fi])+'</span>';h+='</div></div>';}
    return h;
  }

  function refresh() {
    var data = readData();
    if (data && data.stat_data) {
      var ns = JSON.stringify(data.stat_data);
      if (ns === sig) return;
      sig = ns;
      lastGood = data;
    }
    var sd = (data && data.stat_data) || (lastGood && lastGood.stat_data) || {};
    cur = sd;

    var p0=document.getElementById('p-0');if(p0)p0.innerHTML=renderProfile(sd)||'<div class="empty">暂无数据</div>';
    var p1=document.getElementById('p-1');if(p1)p1.innerHTML=renderFinance(sd)||'<div class="empty">暂无数据</div>';
    var p2=document.getElementById('p-2');if(p2)p2.innerHTML=renderTime(sd)||'<div class="empty">暂无数据</div>';
    var p3=document.getElementById('p-3');if(p3)p3.innerHTML=renderRelations(sd)||'<div class="empty">暂无数据</div>';

    document.querySelectorAll('.npc').forEach(function(c){
      if(c._b)return;c._b=true;
      c.addEventListener('click',function(){
        var uid=c.getAttribute('data-uid');
        var sn=g(sd,'sexual.'+uid);if(!sn)return;
        document.getElementById('modal-t').textContent=s(sn.name)+' - 详情';
        document.getElementById('modal-b').innerHTML=renderModalBody(sn);
        document.getElementById('modal').classList.add('act');
      });
    });
  }

  // Tabs
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act')});
      document.querySelectorAll('.pnl').forEach(function(x){x.classList.remove('act')});
      t.classList.add('act');
      var p=document.getElementById('p-'+t.getAttribute('data-i'));
      if(p)p.classList.add('act');
    });
  });

  // Modal
  document.getElementById('modal-x').addEventListener('click',function(){document.getElementById('modal').classList.remove('act')});
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('act')});

  // Init
  refresh();

  // Events
  try {
    if (typeof eventOn === 'function' && typeof Mvu !== 'undefined' && Mvu.events) {
      eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, function(){ refresh(); });
      eventOn(Mvu.events.VARIABLE_INITIALIZED, function(){ refresh(); });
    }
  } catch(e) {}

  try {
    if (typeof eventOn === 'function' && typeof tavern_events !== 'undefined') {
      eventOn(tavern_events.MESSAGE_RECEIVED, function(){ setTimeout(refresh, 500); });
      eventOn(tavern_events.MESSAGE_UPDATED, function(){ setTimeout(refresh, 300); });
    }
  } catch(e) {}

  setInterval(refresh, 3000);
})();
</script>
</body>
</html>
