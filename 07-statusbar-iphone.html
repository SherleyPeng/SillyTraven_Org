<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>StatusBar</title>
<style>
:root{--bg:#f2f2f7;--fg:#fff;--glass:rgba(255,255,255,0.72);--glass2:rgba(255,255,255,0.55);--glass3:rgba(255,255,255,0.35);--border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.10);--text:#1c1c1e;--dim:#8e8e93;--dimmer:#aeaeb2;--bright:#000;--blue:#007aff;--green:#34c759;--red:#ff3b30;--orange:#ff9500;--pink:#ff2d55;--purple:#af52de;--teal:#5ac8fa;--yellow:#ffcc00;--r:14px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;align-items:center;justify-content:center}
/* iPad Proportions */
.phone-wrap{position:relative;margin:4px auto;width:600px;height:780px;perspective:900px}
.phone-body{width:600px;height:780px;border-radius:48px;position:relative;overflow:hidden;box-shadow:0 0 0 3px #d1d1d6,0 0 0 5px #e5e5ea,0 0 0 6px #f2f2f7,0 10px 40px rgba(0,0,0,0.18),0 24px 72px rgba(0,0,0,0.10);transform:rotateX(2deg)}
.phone-body::before{content:'';position:absolute;inset:-3px;border-radius:51px;background:linear-gradient(180deg,#c7c7cc 0%,#d1d1d6 30%,#e5e5ea 50%,#d1d1d6 70%,#c7c7cc 100%);z-index:-1}
.phone-body::after{content:'';position:absolute;left:-8px;top:140px;width:4px;height:36px;background:#c7c7cc;border-radius:2px 0 0 2px;box-shadow:0 48px 0 0 #c7c7cc,0 96px 0 0 #c7c7cc}
.phone-wrap::before{content:'';position:absolute;right:-8px;top:160px;width:4px;height:60px;background:#c7c7cc;border-radius:0 2px 2px 0;z-index:10}

/* Wallpaper */
.wp-bg{position:absolute;inset:0;background:linear-gradient(160deg,#f0e6f6 0%,#e8f0fe 20%,#fef9e7 40%,#e6f3e6 60%,#fce4ec 80%,#f3e5f5 100%);z-index:0}
.wp-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,0.4) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(200,220,255,0.3) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(255,240,220,0.25) 0%,transparent 60%)}

/* Dynamic Island - minimal */
.island{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(0,0,0,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:22px;padding:5px 18px;display:flex;align-items:center;gap:8px}
.island .is-time{font-size:12px;font-weight:600;color:#fff;letter-spacing:.5px}
.island .is-label{font-size:8px;color:rgba(255,255,255,0.5)}

/* Top statusbar */
.sb{display:flex;justify-content:space-between;padding:10px 32px 0;font-size:12px;font-weight:600;color:var(--text);position:relative;z-index:99;mix-blend-mode:darken}
.sb .t{letter-spacing:.5px;opacity:0}.sb .i{display:flex;gap:5px;align-items:center;font-size:10px;color:var(--dim)}

/* Home */
.home{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;z-index:1}
.hc{position:relative;flex:1;display:flex;flex-direction:column;padding:0 24px;align-items:center}
.h-date{margin-top:52px;text-align:center}
.h-date .weekday{font-size:15px;font-weight:500;color:var(--dim)}
.h-date .date{font-size:38px;font-weight:200;color:var(--bright);letter-spacing:-2px;line-height:1.1}
.ww{margin-top:10px;text-align:center}
.ww .wi{font-size:36px;display:block}
.ww .wt{font-size:15px;font-weight:500;color:var(--text);margin-top:2px}
.ww .wd{font-size:11px;color:var(--dim);margin-top:1px}
.h-spacer{flex:1}

/* App grid */
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px 0;padding:0 4px;margin-bottom:10px;width:100%}
.ai{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .15s;position:relative}
.ai:active{transform:scale(.85)}
.ai .ic{width:62px;height:62px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:600;position:relative;background:rgba(255,255,255,0.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.7);box-shadow:0 4px 16px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.8);color:#444;text-shadow:0 1px 2px rgba(255,255,255,0.6)}
.ai .lb{font-size:10px;color:var(--text);text-align:center;line-height:1.2;font-weight:500}
.bdg{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;background:var(--red);color:#fff;border-radius:9px;font-size:10px;font-weight:600;display:none;align-items:center;justify-content:center;padding:0 5px;z-index:5;border:2px solid #fff}.bdg.on{display:flex}

/* === BOTTOM DOCK — Status Display === */
.dock{background:rgba(255,255,255,0.65);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.8);border-radius:24px;padding:16px 24px;margin:0 0 14px;display:flex;gap:0;z-index:2}
.dock .v-g{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:100%}
.dock .v-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.dock .v-icon{font-size:22px;line-height:1}
.dock .v-bar{width:100%;height:8px;background:rgba(0,0,0,0.06);border-radius:4px;overflow:hidden}
.dock .v-fill{height:100%;border-radius:4px;transition:width .4s}
.dock .v-pct{font-size:13px;font-weight:700;color:var(--text)}
.dock .v-label{font-size:10px;color:var(--dim);letter-spacing:.5px;font-weight:500}
.dock .v-s{background:linear-gradient(90deg,#34c759,#5ac8fa)}.v-m{background:linear-gradient(90deg,#007aff,#af52de)}.v-f{background:linear-gradient(90deg,#ffcc00,#ff9500)}.v-h{background:linear-gradient(90deg,#ff9500,#ff3b30)}.v-y{background:linear-gradient(90deg,#5ac8fa,#007aff)}

/* App Pages */
.app-page{position:absolute;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;padding-top:50px}
.app-page.open{display:flex;animation:none}
.an{display:flex;align-items:center;padding:4px 16px;gap:14px;min-height:44px;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.an .bk,.mn .bk{width:28px;height:28px;border-radius:50%;background:var(--glass2);border:1px solid var(--border2);color:var(--blue);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.an .tt{font-size:17px;font-weight:600;color:var(--text)}.ab{flex:1;overflow-y:auto;padding:8px 16px 20px}
.cell{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.ct{font-size:14px;font-weight:600;color:var(--bright)}.cs{font-size:12px;color:var(--dim)}
.cr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}.cr:last-child{border-bottom:none}.cr .lbl{color:var(--dim)}.cr .val{color:var(--text);font-weight:500}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}.fd{display:flex;flex-direction:column}.fl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}.fv{font-size:13px;color:var(--text)}
.vr{display:flex;align-items:center;gap:8px;padding:3px 0}.vr .vl{font-size:11px;color:var(--dim);width:30px}.vr .vb{flex:1;height:5px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden}.vr .vbf{height:100%;border-radius:3px;transition:width .4s}.vr .vv{font-size:11px;color:var(--text);width:22px;text-align:right}.vbf.p{background:linear-gradient(90deg,var(--green),var(--teal))}.vbf.m{background:linear-gradient(90deg,var(--blue),var(--purple))}.vbf.f{background:linear-gradient(90deg,var(--yellow),var(--orange))}.vbf.h{background:linear-gradient(90deg,var(--orange),var(--red))}.vbf.y{background:linear-gradient(90deg,var(--teal),var(--blue))}
.ar{display:flex;justify-content:space-between;align-items:center;padding:8px 0}.ar:not(:last-child){border-bottom:1px solid var(--border)}.aname{font-size:14px;color:var(--text)}.aval{font-size:18px;font-weight:600;color:var(--green)}
.txr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}.txc{color:var(--dim);width:44px}.txn{color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.txd{color:var(--dimmer);width:56px;text-align:right}.txa{font-weight:600;width:60px;text-align:right}.txa.in{color:var(--green)}.txa.out{color:var(--red)}
.td{text-align:center;padding:16px 0}.tc{font-size:52px;font-weight:200;color:var(--bright);letter-spacing:3px}.tdt{font-size:18px;color:var(--text);margin-top:3px}.tw{font-size:16px;color:var(--blue);margin-top:2px}.ti{font-size:14px;color:var(--dim);margin-top:6px}
.nc{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer}.nc:hover{background:rgba(255,255,255,0.9)}.nch{display:flex;justify-content:space-between}.ncn{font-size:14px;font-weight:600;color:var(--bright)}.nca{font-size:11px;color:var(--dim)}.ncs{display:flex;gap:12px;margin-top:6px;font-size:11px}.ncst{color:var(--dim)}
.bw{width:50px;height:3px;background:rgba(0,0,0,0.08);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}.bf{height:100%;border-radius:2px}.aff{background:var(--pink)}.obed{background:var(--blue)}.frd{background:var(--green)}.rom{background:var(--pink)}.hat{background:var(--red)}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:500}.bs{background:rgba(52,199,89,0.15);color:var(--green)}.bfe{background:rgba(255,149,0,0.15);color:var(--orange)}.bpe{background:rgba(255,59,48,0.15);color:var(--red)}
.tag{display:inline-block;background:rgba(0,0,0,0.04);border-radius:5px;padding:2px 7px;font-size:11px;margin:2px}.tg{color:var(--green)}.tnv{color:var(--orange)}.tp{color:var(--red)}
.cn{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}.ca{width:32px;height:32px;border-radius:50%;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:14px}.ci{flex:1}.cnm{font-size:13px;font-weight:500;color:var(--text)}.car{color:var(--dimmer);font-size:14px;margin:0 4px}
.wxl{display:flex;flex-direction:column;gap:1px}.wxc{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}.wxa{width:44px;height:44px;border-radius:8px;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:var(--dim)}.wxi{flex:1;min-width:0}.wxn{font-size:14px;font-weight:500;color:var(--text)}.wxp{font-size:11px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.wxt{font-size:10px;color:var(--dimmer)}
.wxchat{display:flex;flex-direction:column;gap:8px;padding:8px 0}.wxb{max-width:72%;padding:9px 13px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word}.wxb.me{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}.wxb.you{align-self:flex-start;background:#e9e9ed;color:var(--text);border-bottom-left-radius:4px}.wxbt{font-size:10px;color:var(--dimmer);align-self:center;margin:3px 0}
.wp{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}.wph{display:flex;align-items:center;gap:8px;margin-bottom:6px}.wpa{width:30px;height:30px;border-radius:50%;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:14px}.wpu{font-size:12px;font-weight:500;color:var(--text)}.wpt{font-size:10px;color:var(--dimmer);margin-left:auto}.wpti{font-size:14px;font-weight:600;color:var(--bright);margin-bottom:4px}.wpb{font-size:12px;color:var(--dim);line-height:1.6}.wcat{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;margin-bottom:6px;font-weight:500}.wcat.tc{background:rgba(0,122,255,0.1);color:var(--blue)}.wcat.en{background:rgba(175,82,222,0.1);color:var(--purple)}.wcat.po{background:rgba(255,149,0,0.1);color:var(--orange)}.wcat.so{background:rgba(52,199,89,0.1);color:var(--green)}
.kdc{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;position:relative}.kdc.rv{opacity:0.4}.kd-id{font-size:11px;color:var(--dim);margin-bottom:3px}.kd-cmd{font-size:14px;font-weight:600;color:var(--bright);margin-bottom:5px}.kd-res{font-size:12px;color:var(--dim);line-height:1.5;margin-bottom:4px}.kd-time{font-size:10px;color:var(--dimmer)}.kd-badge{position:absolute;top:10px;right:12px;font-size:10px;padding:2px 8px;border-radius:5px;font-weight:500}.kd-badge.ac{background:rgba(52,199,89,0.12);color:var(--green)}.kd-badge.rk{background:rgba(255,59,48,0.12);color:var(--red)}
.kd-fold{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--rs);padding:12px;text-align:center;cursor:pointer;font-size:12px;color:var(--blue);margin-bottom:8px}.kd-fold:hover{background:var(--glass2)}.kd-folded{display:none}
.evc{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}.evd{font-size:11px;color:var(--blue);font-weight:500;width:38px;text-align:center}.evi{flex:1}.evt{font-size:13px;font-weight:500;color:var(--text)}.evy{font-size:10px;color:var(--dim)}
.modal{position:absolute;inset:0;z-index:300;background:rgba(242,242,247,0.97);backdrop-filter:blur(40px);display:none;flex-direction:column;padding-top:50px}.modal.open{display:flex}
.mn{display:flex;align-items:center;padding:4px 16px;gap:14px;min-height:44px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}.mb{flex:1;overflow-y:auto;padding:8px 16px 20px}
.ms{margin-bottom:14px}.mst{font-size:11px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px}.mf{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:6px 8px}.mfl{font-size:10px;color:var(--dim)}.mfv{font-size:12px;color:var(--text);margin-top:2px}
.bpt{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}.bpn{font-size:11px;font-weight:600;color:var(--pink);margin-bottom:6px}.bpg{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:4px 8px}
.empty{text-align:center;padding:44px 20px;color:var(--dim);font-size:14px}.empty .ei{font-size:48px;margin-bottom:12px;opacity:.3}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:2px}
</style>
</head>
<body>
<div class="phone-wrap"><div class="phone-body">
<div class="wp-bg"></div>

<div class="island"><span class="is-label">✦ 言灵</span></div>

<div class="sb"><span style="opacity:0">13:00</span><span class="i"><span>●●●●○</span><span>WiFi</span><span>🔋</span></span></div>

<div class="home"><div class="hc">
<div class="h-date"><div class="weekday" id="h-weekday">星期六</div><div class="date" id="h-date">12月14日</div><div style="font-size:15px;font-weight:600;color:var(--text);margin-top:2px" id="h-time">13:00</div></div>
<div class="ww"><div class="wi" id="ww-icon">☀️</div><div class="wt" id="ww-temp">晴</div><div class="wd" id="ww-desc">冬 · 北京</div></div>
<div class="h-spacer"></div>
<div class="app-grid">
<div class="ai" data-app="profile"><div class="ic">👤<div class="bdg" id="bg-profile"></div></div><div class="lb">人物</div></div>
<div class="ai" data-app="assets"><div class="ic">🏦</div><div class="lb">资产</div></div>
<div class="ai" data-app="calendar"><div class="ic" style="font-size:20px">📅</div><div class="lb">日历</div></div>
<div class="ai" data-app="contacts"><div class="ic">📇<div class="bdg" id="bg-contacts"></div></div><div class="lb">通讯录</div></div>

<div class="ai" data-app="lover"><div class="ic">💕<div class="bdg" id="bg-lover"></div></div><div class="lb">Lover</div></div>
<div class="ai" data-app="wechat"><div class="ic">💬<div class="bdg" id="bg-wechat"></div></div><div class="lb">微信</div></div>
<div class="ai" data-app="weibo"><div class="ic">📰<div class="bdg" id="bg-weibo"></div></div><div class="lb">微博</div></div>
<div class="ai" data-app="kotodama"><div class="ic">✨<div class="bdg" id="bg-kotodama"></div></div><div class="lb">言灵</div></div>
</div>

<!-- Bottom Dock — Status Bars -->
<div class="dock">
<div class="v-g">
<div class="v-item"><span class="v-icon">💪</span><div class="v-bar"><div class="v-fill v-s" id="dock-phy" style="width:85%"></div></div><span class="v-pct" id="dock-phy-t">85</span><span class="v-label">体力</span></div>
<div class="v-item"><span class="v-icon">🧠</span><div class="v-bar"><div class="v-fill v-m" id="dock-mtl" style="width:72%"></div></div><span class="v-pct" id="dock-mtl-t">72</span><span class="v-label">精神</span></div>
<div class="v-item"><span class="v-icon">😴</span><div class="v-bar"><div class="v-fill v-f" id="dock-fat" style="width:20%"></div></div><span class="v-pct" id="dock-fat-t">20</span><span class="v-label">疲劳</span></div>
<div class="v-item"><span class="v-icon">🍔</span><div class="v-bar"><div class="v-fill v-h" id="dock-hun" style="width:60%"></div></div><span class="v-pct" id="dock-hun-t">60</span><span class="v-label">饱腹</span></div>
<div class="v-item"><span class="v-icon">🫧</span><div class="v-bar"><div class="v-fill v-y" id="dock-hyg" style="width:75%"></div></div><span class="v-pct" id="dock-hyg-t">75</span><span class="v-label">卫生</span></div>
</div></div>
</div></div>

<div class="app-page" id="app-profile"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">人物</span></div><div class="ab" id="body-profile"></div></div>
<div class="app-page" id="app-assets"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">资产</span></div><div class="ab" id="body-assets"></div></div>
<div class="app-page" id="app-calendar"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">日历</span></div><div class="ab" id="body-calendar"></div></div>
<div class="app-page" id="app-contacts"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">通讯录</span></div><div class="ab" id="body-contacts"></div></div>

<div class="app-page" id="app-lover"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">Lover</span></div><div class="ab" id="body-lover"></div></div>
<div class="app-page" id="app-wechat"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">微信</span></div><div class="ab" id="body-wechat"></div></div>
<div class="app-page" id="app-wxchat"><div class="an"><button class="bk" data-back="wechat">←</button><span class="tt" id="wxchat-title">聊天</span></div><div class="ab" id="body-wxchat"></div></div>
<div class="app-page" id="app-weibo"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">微博</span></div><div class="ab" id="body-weibo"></div></div>
<div class="app-page" id="app-kotodama"><div class="an"><button class="bk" data-back="home">←</button><span class="tt">言灵</span></div><div class="ab" id="body-kotodama"></div></div>
<div class="modal" id="npc-modal"><div class="mn"><button class="bk" id="npc-modal-back" data-back="lover">←</button><span class="tt" id="npc-modal-title"></span></div><div class="mb" id="npc-modal-body"></div></div>
</div></div>

<script>
