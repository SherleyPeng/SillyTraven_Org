<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--bg:#0f0f1a;--glass:rgba(255,255,255,0.06);--ghover:rgba(255,255,255,0.10);--border:rgba(255,255,255,0.10);--text:#e0e0e0;--dim:#888;--bright:#fff;--accent:#7c8cf8;--adim:rgba(124,140,248,0.25);--danger:#f87171;--warn:#fbbf24;--success:#34d399;--pink:#f472b6;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;line-height:1.5}
.pnl{padding:8px;max-width:600px;margin:0 auto}
.tabs{display:flex;gap:4px;padding:5px;background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px}
.tab{flex:1;padding:7px 3px;border:none;background:transparent;color:var(--dim);font-size:12px;cursor:pointer;border-radius:8px;transition:.2s}
.tab:hover{background:var(--ghover)}.tab.act{background:var(--adim);color:var(--accent);font-weight:600}
.p{display:none}.p.act{display:block}
.c{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ct{font-size:13px;font-weight:600;color:var(--bright)}.cs{font-size:11px;color:var(--dim)}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px 10px}
.f{display:flex;flex-direction:column}.fl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}.fv{font-size:12px;color:var(--text)}
.chips{display:flex;flex-wrap:wrap;gap:3px}.chip{background:var(--ghover);border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-size:10px}
.ast{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}.ast-v{font-size:15px;font-weight:600;color:var(--bright)}
.txl{max-height:180px;overflow-y:auto}.tx{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:10px}
.txd{color:var(--dim);width:68px;flex-shrink:0}.txc{color:var(--dim);width:52px;flex-shrink:0;text-align:center}.txa{font-weight:600;width:60px;flex-shrink:0;text-align:right}.in{color:var(--success)}.out{color:var(--danger)}
.tim{text-align:center;padding:16px 10px}.tim-c{font-size:32px;font-weight:200;color:var(--bright);letter-spacing:2px}.tim-d{font-size:15px;color:var(--text);margin-top:3px}.tim-w{font-size:12px;color:var(--accent);margin-top:2px}.tim-we{font-size:18px;margin-top:5px}
.nc{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:.15s}
.nc:hover{background:var(--ghover);border-color:var(--adim)}.nch{display:flex;justify-content:space-between}.ncn{font-size:12px;font-weight:600;color:var(--bright)}.nca{font-size:10px;color:var(--dim)}
.ncs{display:flex;gap:10px;margin-top:4px;font-size:10px;color:var(--dim)}
.bw{width:50px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:3px}
.bf{height:100%;border-radius:2px;display:block}.aff{background:var(--pink)}.obed{background:var(--accent)}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}.bs{background:rgba(52,211,153,0.2);color:var(--success)}.bfe{background:rgba(251,191,36,0.2);color:var(--warn)}.bp{background:rgba(248,113,113,0.2);color:var(--danger)}
.tag{display:inline-block;background:var(--ghover);border-radius:3px;padding:1px 5px;font-size:10px;margin:1px}.tv{color:var(--success)}.tnv{color:var(--warn)}.tp{color:var(--danger)}
.emp{text-align:center;padding:24px;color:var(--dim);font-size:12px}
.rw{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px}.rwl{color:var(--bright);font-weight:600}.rwr{color:var(--dim)}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,15,26,0.97);z-index:999;flex-direction:column;overflow:hidden}.md.act{display:flex}
.mdh{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}.mdt{font-size:15px;font-weight:600;color:var(--bright)}.mdx{width:28px;height:28px;border:none;background:var(--glass);color:var(--text);font-size:16px;border-radius:6px;cursor:pointer}
.mdb{flex:1;overflow-y:auto;padding:12px 14px}
.ms{margin-bottom:12px}.mst{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:5px}
.mf{background:var(--glass);border:1px solid var(--border);border-radius:5px;padding:5px 7px}.mfl{font-size:10px;color:var(--dim)}.mfv{font-size:12px;color:var(--text);margin-top:1px}
.bpt{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;margin-bottom:5px}.bptn{font-size:11px;font-weight:600;color:var(--pink);margin-bottom:5px}.bptg{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:3px 7px}
</style>
</head>
<body>
<div class="pnl">
  <div class="tabs">
    <button class="tab act" data-i="0">&#x1F464; 人物</button>
    <button class="tab" data-i="1">&#x1F4B0; 财务</button>
    <button class="tab" data-i="2">&#x1F550; 时间</button>
    <button class="tab" data-i="3">&#x1F495; 关系</button>
  </div>
  <div class="p act" id="p-0"></div>
  <div class="p" id="p-1"></div>
  <div class="p" id="p-2"></div>
  <div class="p" id="p-3"></div>
  <div class="md" id="md"><div class="mdh"><span class="mdt" id="mdt"></span><button class="mdx" id="mdx">&times;</button></div><div class="mdb" id="mdb"></div></div>
</div>
<script>
(function(){
  var cur={},sig='',last=null;
  function G(o,p,d){if(!o||!p)return d;var k=p.replace(/\[(\d+)\]/g,'.$1').split('.'),c=o;for(var i=0;i<k.length;i++){if(c==null)return d;c=c[k[i]];}return c!=null?c:d;}
  function S(v,d){return(v==null||v==='')?(d||'-'):String(v);}
  function N(v,d){var x=Number(v);return isNaN(x)?(d!=null?String(d):'0'):String(x);}
  function B(v,m,c){var p=Math.min(100,Math.max(0,(Number(v)||0)/(Number(m)||1)*100));return'<span class="bw"><span class="bf '+c+'" style="width:'+p+'%"></span></span>'+Math.round(p);}
  function F(l,v){return'<div class="f"><span class="fl">'+l+'</span><span class="fv">'+v+'</span></div>';}
  function MF(l,v){return'<div class="mf"><div class="mfl">'+l+'</div><div class="mfv">'+v+'</div></div>';}

  function readData(){
    try{if(typeof Mvu!=='undefined'&&Mvu.getMvuData){var r=Mvu.getMvuData({type:'message',message_id:'latest'});if(r&&r.stat_data&&Object.keys(r.stat_data).length)return r.stat_data;}catch(e){}
    try{if(typeof Mvu!=='undefined'&&Mvu.getMvuData){var r=Mvu.getMvuData({type:'message',message_id:0});if(r&&r.stat_data&&Object.keys(r.stat_data).length)return r.stat_data;}catch(e){}
    try{var r=getVariables({type:'message'});if(r&&r.stat_data&&Object.keys(r.stat_data).length)return r.stat_data;}catch(e){}
    try{var mid=typeof getCurrentMessageId==='function'?getCurrentMessageId():undefined;var r2=Mvu.getMvuData({type:'message',message_id:mid});if(r2&&r2.stat_data&&Object.keys(r2.stat_data).length)return r2.stat_data;}catch(e){}
    try{var r=getVariables({type:'message',message_id:'latest'});if(r&&r.stat_data&&Object.keys(r.stat_data).length)return r.stat_data;}catch(e){}
    return last||{};
  }

  function rProfile(d){var p=d.profile||{},bg=p.background||{},st=p.status||{},app=p.appearance||{},inv=p.inventory||[],rels=p.relationships||{};var h='<div class="c"><div class="ch"><span class="ct">'+S(p.name)+'</span><span class="cs">'+S(p.occupation)+'</span></div><div class="g">';h+=F('性别',S(p.gender));h+=F('年龄',N(p.age)+'岁');h+=F('出生',N(p.birth_year)+'.'+N(p.birth_month)+'.'+N(p.birth_day));h+=F('外貌',S(app.build)+(app.full?', '+S(app.full):''));h+=F('身体',S(st.physical));h+=F('精神',S(st.mental));h+='</div></div><div class="c"><div class="ct" style="margin-bottom:5px">背景</div><div class="g">';h+=F('家乡',S(bg.hometown));h+=F('教育',S(bg.education));h+=F('居住',S(bg.living));h+=F('求职',S(bg.job_status));h+='</div></div><div class="c"><div class="ct" style="margin-bottom:5px">物品</div>';if(inv.length){h+='<div class="chips">';for(var i=0;i<inv.length;i++)h+='<span class="chip">'+S(inv[i].name)+(inv[i].desc?'('+S(inv[i].desc)+')':'')+'</span>';h+='</div>';}else h+='<span class="fl">暂无</span>';h+='</div>';var rk=Object.keys(rels);if(rk.length){h+='<div class="c"><div class="ct" style="margin-bottom:5px">关系 ('+rk.length+')</div>';for(var ri=0;ri<rk.length;ri++){var r=rels[rk[ri]];h+='<div class="rw"><span class="rwl">'+S(r.name)+'</span><span class="rwr">'+S(r.relation)+' - '+S(r.status)+'</span></div>';}h+='</div>';}return h;}

  function rFinance(d){var f=d.finance||{},a=f.assets||{},tx=f.transactions||[],ak=Object.keys(a);var h='<div class="c"><div class="ct" style="margin-bottom:6px">资产</div>';if(ak.length)for(var i=0;i<ak.length;i++)h+='<div class="ast"><span>'+S(ak[i])+'</span><span class="ast-v">'+N(a[ak[i]],'0')+' 元</span></div>';else h+='<span class="fl">暂无</span>';h+='</div>';if(tx.length){h+='<div class="c"><div class="ct" style="margin-bottom:6px">收支</div><div class="txl">';var st=Math.max(0,tx.length-10);for(var ti=st;ti<tx.length;ti++){var t=tx[ti],inc=t.type==='收入';h+='<div class="tx"><span class="txd">'+S(t.date)+'</span><span class="txc">'+S(t.category)+'</span><span class="txa '+(inc?'in':'out')+'">'+(inc?'+':'')+N(t.amount,'0')+'</span></div>';}h+='</div></div>';}return h;}

  function rTime(d){var t=d.time||{};return'<div class="c tim"><div class="tim-c">'+String(t.hour||0).padStart(2,'0')+':'+String(t.minute||0).padStart(2,'0')+'</div><div class="tim-d">'+N(t.year)+'年'+N(t.month)+'月'+N(t.day)+'日</div><div class="tim-w">'+S(t.weekday)+'</div><div class="tim-we">'+S(t.weather)+'</div></div>';}

  function rRelations(d){var sx=d.sexual||{},ml=d.npc_male||{},sk=Object.keys(sx),mk=Object.keys(ml),h='';if(sk.length)for(var i=0;i<sk.length;i++){var u=sk[i],sn=sx[u],ph=G(sn,'menstrual.current_phase','?'),bc=({'安全期':'bs','受孕期':'bfe','月经中':'bp'})[ph]||'';h+='<div class="nc" data-uid="'+u+'"><div class="nch"><span class="ncn">'+S(sn.name)+'</span><span class="nca">'+N(sn.age)+'岁</span></div><div class="ncs"><span>好感 '+B(sn.affection,100,'aff')+'</span><span>服从 '+B(sn.obedience,100,'obed')+'</span><span class="badge '+bc+'">'+S(ph)+'</span></div><span style="font-size:10px;color:var(--dim)">'+(sn.is_virgin?'<span class="tag tv">处</span>':'<span class="tag tnv">非处</span>')+(G(sn,'uterus.pregnancy')?'<span class="tag tp">孕</span>':'')+'</span></div>';}if(mk.length)for(var mi=0;mi<mk.length;mi++){var mn=ml[mk[mi]];h+='<div class="c"><div class="ch"><span class="ct">'+S(mn.name)+'</span><span class="cs">'+N(mn.age)+'岁</span></div><div class="g">'+F('职业',S(mn.occupation))+F('关系',S(mn.social_status))+'</div></div>';}return h||'<div class="emp">暂无 NPC</div>';}

  function rModal(sn){var bp=sn.body_parts||{},br=bp.breasts||{},nip=bp.nipples||{},vag=bp.vagina||{},ut=bp.uterus||{},an=bp.anus||{},mnst=sn.menstrual||{},exp=sn.experience||{};function BT(nm,fs){var h='<div class="bpt"><div class="bptn">'+nm+'</div><div class="bptg">';for(var i=0;i<fs.length;i++)h+=MF(fs[i][0],fs[i][1]);return h+'</div></div>';}var h='<div class="ms"><div class="mst">基本信息</div><div class="mg">';h+=MF('姓名',S(sn.name));h+=MF('年龄',N(sn.age)+'岁');h+=MF('出生',N(sn.birth_year)+'.'+N(sn.birth_month)+'.'+N(sn.birth_day));h+=MF('处女',sn.is_virgin?'是':'否');if(!sn.is_virgin&&sn.first_partner)h+=MF('初夜',S(sn.first_partner));h+=MF('好感',B(sn.affection,100,'aff'));h+=MF('服从',B(sn.obedience,100,'obed'));h+='</div></div><div class="ms"><div class="mst">外貌穿着</div>'+MF('外貌',S(sn.appearance))+MF('穿着',S(sn.outfit))+'</div>';if(sn.personality)h+='<div class="ms"><div class="mst">性格</div><div style="font-size:11px;color:var(--dim);line-height:1.6">'+S(sn.personality).replace(/\n/g,'<br>')+'</div></div>';h+='<div class="ms"><div class="mst">月经</div><div class="mg">';h+=MF('周期',N(mnst.cycle_length,'28')+'天');h+=MF('经期',N(mnst.period_duration,'5')+'天');h+=MF('上次',S(mnst.last_period_date));h+=MF('状态',S(mnst.current_phase));h+='</div></div><div class="ms"><div class="mst">性经验</div><div class="mg">';h+=MF('总计',N(exp.total)+'次');h+=MF('口交',N(exp.oral)+'次');h+=MF('插入',N(exp.vaginal)+'次');h+=MF('肛交',N(exp.anal)+'次');h+=MF('高潮',N(sn.orgasm_count)+'次');h+='</div></div><div class="ms"><div class="mst">身体部位</div>';h+=BT('胸部',[['大小',S(br.size)],['形状',S(br.shape)],['颜色',S(br.color)],['敏感度',S(br.sensitivity)],['状态',S(br.status)]]);h+=BT('乳头',[['形状',S(nip.shape)],['颜色',S(nip.color)],['乳晕色',S(nip.areola_color)],['乳晕大',S(nip.areola_size)],['敏感度',S(nip.sensitivity)],['状态',S(nip.status)]]);h+=BT('小穴',[['形状',S(vag.shape)],['外阴色',S(vag.color)],['内壁色',S(vag.inner_color)],['松紧',S(vag.tightness)],['湿润',S(vag.wetness)],['敏感度',S(vag.sensitivity)],['状态',S(vag.status)]]);h+=BT('子宫',[['正常',ut.is_normal?'是':'异常'],['怀孕',ut.pregnancy?S(ut.pregnancy):'无'],['敏感度',S(ut.sensitivity)],['状态',S(ut.status)]]);h+=BT('肛门',[['形状',S(an.shape)],['颜色',S(an.color)],['松紧',S(an.tightness)],['敏感度',S(an.sensitivity)],['开发',an.is_developed?'是':'未'],['状态',S(an.status)]]);h+='</div>';var fet=sn.fetishes||[];if(fet.length){h+='<div class="ms"><div class="mst">性癖</div><div>';for(var fi=0;fi<fet.length;fi++)h+='<span class="tag">'+S(fet[fi])+'</span>';h+='</div></div>';}return h;}

  function refresh(){
    var d=readData();
    if(d&&Object.keys(d).length){var ns=JSON.stringify(d);if(ns!==sig){sig=ns;last=d;}}
    var sd=last||{};
    (document.getElementById('p-0')||{}).innerHTML=rProfile(sd)||'<div class="emp">暂无数据</div>';
    (document.getElementById('p-1')||{}).innerHTML=rFinance(sd)||'<div class="emp">暂无数据</div>';
    (document.getElementById('p-2')||{}).innerHTML=rTime(sd)||'<div class="emp">暂无数据</div>';
    (document.getElementById('p-3')||{}).innerHTML=rRelations(sd)||'<div class="emp">暂无数据</div>';
    document.querySelectorAll('.nc').forEach(function(c){if(c._b)return;c._b=true;c.addEventListener('click',function(){var u=c.getAttribute('data-uid'),sn=G(last,'sexual.'+u);if(!sn)return;document.getElementById('mdt').textContent=S(sn.name)+' - 详情';document.getElementById('mdb').innerHTML=rModal(sn);document.getElementById('md').classList.add('act');});});
  }

  document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('act')});document.querySelectorAll('.p').forEach(function(x){x.classList.remove('act')});t.classList.add('act');var p=document.getElementById('p-'+t.getAttribute('data-i'));if(p)p.classList.add('act');});});
  document.getElementById('mdx').addEventListener('click',function(){document.getElementById('md').classList.remove('act')});
  document.getElementById('md').addEventListener('click',function(e){if(e.target===this)this.classList.remove('act')});

  (async function(){
    try{if(typeof waitGlobalInitialized==='function')await waitGlobalInitialized('Mvu');}catch(e){}
    try{if(typeof waitUntil==='function')await waitUntil(function(){var d=readData();return d&&Object.keys(d).length>0;},{timeout:15000,intervalBetweenAttempts:300});}catch(e){}
    refresh();
    setTimeout(function(){refresh();},600);setTimeout(function(){refresh();},2000);
    setInterval(refresh,5000);
    try{if(typeof eventOn==='function'&&typeof Mvu!=='undefined'&&Mvu.events){eventOn(Mvu.events.VARIABLE_UPDATE_ENDED,function(){refresh()});eventOn(Mvu.events.VARIABLE_INITIALIZED,function(){refresh()});}}catch(e){}
    try{if(typeof eventOn==='function'&&typeof tavern_events!=='undefined'){eventOn(tavern_events.MESSAGE_RECEIVED,function(){setTimeout(refresh,800)});eventOn(tavern_events.MESSAGE_UPDATED,function(){setTimeout(refresh,400)});}}catch(e){}
  })();
</script>
</body>
</html>
